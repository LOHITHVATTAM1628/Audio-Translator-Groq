<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Translator</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:450px;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 0 15px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:5px;
            font-weight:bold;
        }

        input,select,button{
            width:100%;
            padding:10px;
            border-radius:8px;
            border:1px solid #ccc;
        }

        button{
            margin-top:20px;
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .result{
            margin-top:20px;
            padding:10px;
            background:#f0f0f0;
            border-radius:8px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>🎤 Audio Translator</h2>

    <form action="/" method="POST" enctype="multipart/form-data">

        <label>Select Audio File</label>
        <input type="file" name="audio" accept=".mp3,.wav,.m4a" required>

        <label>Select Language</label>

        <select name="language">

            <option value="en">English</option>
            <option value="te">Telugu</option>
            <option value="hi">Hindi</option>
            <option value="ta">Tamil</option>
            <option value="kn">Kannada</option>
            <option value="ml">Malayalam</option>

        </select>

        <button type="submit">
            Translate Audio
        </button>

    </form>

    {% if output %}
    <div class="result">
        <h3>Output</h3>
        <p>{{ output }}</p>
    </div>
    {% endif %}

</div>

</body>
</html>
